name: Brick
options:
  minimumXcodeGenVersion: 2.43.0
settings:
  base:
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    SWIFT_VERSION: 5.0
targets:
  Brick:
    type: application
    platform: iOS
    sources:
      - path: Brick
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kenlemon.Brick
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
  BrickTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BrickTests
    dependencies:
      - target: Brick
schemes:
  Brick:
    build:
      targets:
        Brick: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BrickTests
